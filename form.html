<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Formulario Recetario Gratis</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      background: #f7fafc;
      font-family: 'Inter', Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .form-container {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      padding: 32px 24px;
      max-width: 370px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }
    .form-title {
      font-size: 1.3rem;
      font-weight: 600;
      color: #222;
      text-align: center;
      margin-bottom: 8px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .form-input {
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      font-size: 1rem;
      background: #f7fafc;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus {
      border-color: #FF6B35;
      background: #fff;
    }
    .form-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #FF6B35;
      color: #fff;
      font-size: 1.08rem;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      padding: 16px 0;
      box-shadow: 0 2px 8px rgba(255,107,53,0.09);
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
      margin-top: 8px;
    }
    .form-btn:hover {
      background: #ff874f;
    }
    .download-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #10B981;
      color: #fff;
      font-size: 1rem;
      font-weight: 500;
      border: none;
      border-radius: 12px;
      padding: 12px 0;
      box-shadow: 0 2px 8px rgba(16,185,129,0.09);
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
      margin-top: 10px;
    }
    .download-btn:hover {
      background: #059669;
    }
    .whatsapp-link {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #10B981;
      font-size: 0.98rem;
      font-weight: 500;
      text-decoration: none;
      margin: 0 auto;
      margin-top: 14px;
      transition: color 0.2s;
    }
    .whatsapp-link:hover {
      color: #059669;
      text-decoration: underline;
    }
    .confirmation {
      background: #e6fbe7;
      color: #222;
      border-radius: 12px;
      padding: 18px 14px;
      text-align: center;
      font-size: 1.05rem;
      font-weight: 500;
      margin-top: 10px;
      box-shadow: 0 2px 8px rgba(16,185,129,0.07);
    }
    @media (max-width: 480px) {
      .form-container {
        padding: 22px 8px;
        max-width: 98vw;
      }
    }
  </style>
</head>
<body>
  <div class="form-container">
    <div class="form-title">¡Descarga tu recetario gratis!</div>
    <form id="recetarioForm" autocomplete="off">
      <div class="form-group">
        <input type="text" name="nombre" class="form-input" placeholder="Tu nombre (opcional)">
        <input type="email" name="email" class="form-input" placeholder="Tu correo" required>
      </div>
      <button type="submit" class="form-btn">
        <span style="font-size:1.3em;">📥</span>
        Obtener mi recetario gratis
      </button>
    </form>
    <div id="confirmation" style="display:none;">
      <div class="confirmation">
        ¡Gracias! Tu recetario está listo.<br>
        Revisa tu correo o descárgalo aquí mismo.
      </div>
      <button class="download-btn" onclick="window.location.href='recetario.pdf'">
        <span style="font-size:1.2em;">⬇️</span>
        Descargar ahora
      </button>
      <a href="https://wa.me/51971221917?text=Hola,%20quiero%20recibir%20el%20recetario%20gratis" target="_blank" class="whatsapp-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="#10B981" viewBox="0 0 24 24"><path d="M12.004 2.003c-5.523 0-9.997 4.474-9.997 9.997 0 1.762.463 3.488 1.343 5.001l-1.423 5.205 5.338-1.401c1.472.805 3.127 1.229 4.739 1.229h.001c5.523 0 9.997-4.474 9.997-9.997s-4.474-9.997-9.997-9.997zm4.736 14.733c-.2.559-1.164 1.09-1.601 1.153-.409.06-.934.086-1.507-.095-.347-.11-.793-.257-1.366-.504-2.406-1.04-3.97-3.447-4.095-3.613-.119-.164-.98-1.304-.98-2.489 0-1.184.62-1.769.84-2.008.221-.239.482-.299.643-.299.161 0 .322.001.462.009.147.007.345-.056.541.413.2.478.678 1.646.736 1.767.059.119.098.26.02.419-.075.159-.113.257-.223.399-.11.142-.232.316-.331.425-.109.119-.223.249-.096.488.127.239.563.928 1.207 1.504.828.74 1.527.97 1.766 1.08.239.109.377.092.517-.055.14-.147.599-.697.761-.936.162-.239.323-.199.541-.119.218.08 1.382.653 1.619.772.237.119.396.178.454.278.059.099.059.569-.141 1.128z"/></svg>
        Prefiero recibirlo por WhatsApp
      </a>
    </div>
  </div>
  <script>
    document.getElementById('recetarioForm').addEventListener('submit', function(e) {
      e.preventDefault();
      document.getElementById('recetarioForm').style.display = 'none';
      document.getElementById('confirmation').style.display = 'block';
    });
  </script>
</body>
</html>
