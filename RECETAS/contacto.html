<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contacto | CocinaChef</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <span class="logo">CocinaChef</span>
      <ul class="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="publicidad.html">Publicidad</a></li>
        <li><a href="contacto.html" class="active">Contacto</a></li>
      </ul>
    </div>
  </nav>
  <main>
    <section class="contacto-section">
      <h1>Contacto</h1>
      <p>
        ¿Tienes propuestas, comentarios, o deseas contactarte con nosotros? Completa el siguiente formulario o escríbenos a <a href="mailto:info@cocinachef.com">
        info@cocinachef.com</a>
      </p>
      <!-- El formulario ahora envía realmente el mensaje a cristhiansito40@gmail.com usando mailto. -->
      <form class="contact-form" action="mailto:cristhiansito40@gmail.com" method="POST" enctype="text/plain">
        <label for="nombre">Nombre:</label>
        <input type="text" name="nombre" id="nombre" required>
        <label for="email">Correo electrónico:</label>
        <input type="email" name="email" id="email" required>
        <label for="mensaje">Mensaje:</label>
        <textarea name="mensaje" id="mensaje" rows="5" required></textarea>
        <button type="submit" class="btn-generar">Enviar</button>
      </form>
    </section>
  </main>
  <footer class="footer">
    <p>&copy; 2024 CocinaChef. Todos los derechos reservados.</p>
  </footer>
</body>
</html>
